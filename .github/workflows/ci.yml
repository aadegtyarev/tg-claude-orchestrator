# CI: линт + pytest. Тесты оффлайновые (без Telegram/Claude);
# sandbox_test сам скипает реальную изоляцию, если bwrap недоступен.
# Каждый тест-файл гоняется и как pytest, и как `python tests/x_test.py`
# (run_all.sh) — pytest выбран для CI как единый раннер с отчётом.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: python -m pytest

  # Скан секретов: gitleaks в режиме detect сканит и содержимое файлов, и
  # СООБЩЕНИЯ коммитов (ровно класс утечки, если секрет подставится в
  # commit message). Плейсхолдеры в доках (ghp_xxx и т.п.) заглушены в
  # .gitleaks.toml, чтобы не было ложных срабатываний.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # вся история — иначе scan видит только один коммит
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ""  # для публичного репо лицензия не требуется
          # gitleaks-action v2 требует токен для сканирования pull_request-событий
          # (сравнивает диапазон коммитов PR через GitHub API).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
