# CI: линт + pytest. Тесты оффлайновые (без Telegram/Claude);
# sandbox_test сам скипает реальную изоляцию, если bwrap недоступен.
# Каждый тест-файл гоняется и как pytest, и как `python tests/x_test.py`
# (run_all.sh) — pytest выбран для CI как единый раннер с отчётом.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: python -m pytest
