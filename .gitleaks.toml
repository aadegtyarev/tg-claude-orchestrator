# Конфиг gitleaks для claude-orchestrator.
# Расширяет дефолтный набор правил; глушим только ЗАВЕДОМЫЕ плейсхолдеры в
# примерах конфигов и документации, чтобы CI/pre-commit не падали ложно.
# Настоящие секреты в этих же файлах правила всё равно поймают (плейсхолдеры
# заглушены точечными regex, а не открытием файлов целиком, кроме .env.example
# — он по определению состоит из примеров).
title = "claude-orchestrator gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Плейсхолдеры в примерах и документации — не настоящие секреты"
paths = [
  '''\.env\.example$''',
]
regexes = [
  '''ghp_xxx''',
  '''your_token_here''',
  '''__long_random_string__''',
]
