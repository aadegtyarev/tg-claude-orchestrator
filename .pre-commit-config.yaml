# Локальные хуки перед коммитом. Установка (один раз):
#   pip install pre-commit && pre-commit install
# Обновить пины до свежих версий: pre-commit autoupdate
#
# gitleaks здесь ловит секреты в staged-изменениях ДО коммита — самый ранний
# барьер. Полный скан истории и СООБЩЕНИЙ коммитов делает CI
# (.github/workflows/ci.yml, job "secrets"). Конфиг общий — .gitleaks.toml.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
